server.port=${TP_WEB_PORT:8080}
deliverance.tensor.operations.type=${TP_TENSOR_OPERATIONS:simd}

deliverance-model.configs[0].model-name=${TP_MODEL:gemma-2-2b-it-JQ4}
deliverance-model.configs[0].model-owner=${TP_OWNER:tjake}
deliverance-model.configs[0].inference-type=GENERATION
deliverance-model.configs[0].tensor-parallel.enabled=true
deliverance-model.configs[0].tensor-parallel.cluster=${TP_CLUSTER:deliverance-tp-local}
deliverance-model.configs[0].tensor-parallel.node-id=coordinator
deliverance-model.configs[0].tensor-parallel.uri=udp://${TP_HOST:127.0.0.1}:${TP_COORDINATOR_PORT:42606}
deliverance-model.configs[0].tensor-parallel.seeds[0]=coordinator=udp://${TP_HOST:127.0.0.1}:${TP_COORDINATOR_PORT:42606}
deliverance-model.configs[0].tensor-parallel.seeds[1]=node-0=udp://${TP_HOST:127.0.0.1}:${TP_NODE0_PORT:42604}
deliverance-model.configs[0].tensor-parallel.seeds[2]=node-1=udp://${TP_HOST:127.0.0.1}:${TP_NODE1_PORT:42605}
deliverance-model.configs[0].tensor-parallel.deployment=${TP_DEPLOYMENT:benchmark}
deliverance-model.configs[0].tensor-parallel.size=${TP_SIZE:4}
deliverance-model.configs[0].tensor-parallel.max-ranks-per-worker=${TP_MAX_RANKS_PER_WORKER:2}
deliverance-model.configs[0].tensor-parallel.ready-timeout-seconds=${TP_READY_TIMEOUT_SECONDS:120}
deliverance-model.configs[0].tensor-parallel.rank-endpoint-timeout-seconds=${TP_RANK_ENDPOINT_TIMEOUT_SECONDS:300}
deliverance-model.configs[0].tensor-parallel.output-head-quantization=${TP_OUTPUT_HEAD_QUANTIZATION:Q4}
